## Organize Config.yaml
bot_settings:
  qna:
    source_name: "latest"
    max_iter: 25



# LiteLLM compatible modelstring
indexing:
  pageindex_model: "openrouter/qwen/qwen-2.5-7b-instruct"
  index_dir: "indexed"
  vault_dir: ""  # Path to local docs directory (e.g., /path/to/hyperliquid-docs-trimmed)

ingestion:
  sitemap_index: "{http://www.sitemaps.org/schemas/sitemap/0.9}"
  user_agent: "Mozilla/5.0 (compatible; GitBookDownloader/1.0)"
  concurrency: 4
  delay: 0.3
  output_dir: "sources"
